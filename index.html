<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>For Biw 💖</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ffd6e8,#fff);overflow-x:hidden}
.card{max-width:720px;width:92%;margin:24px auto;background:rgba(255,255,255,.92);border-radius:24px;padding:24px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.15)}
h1{color:#ff4f8b}p{line-height:1.8;color:#555}.note{font-weight:bold;color:#ff4f8b}
button{background:#ff5f9a;color:#fff;border:none;padding:14px 24px;border-radius:999px;font-size:18px;cursor:pointer}
.slideshow{position:relative;max-width:360px;aspect-ratio:3/4;margin:20px auto;overflow:hidden;border-radius:18px}
.slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s}.slide.active{opacity:1}
.prev,.next{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border:none;border-radius:50%;background:#ffffffbb;font-size:22px;cursor:pointer}
.prev{left:8px}.next{right:8px}.dots{position:absolute;bottom:12px;width:100%;text-align:center}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#fff;opacity:.5;margin:0 4px}.dot.active{background:#ff4f8b;opacity:1}
.heart{position:fixed;bottom:-30px;pointer-events:none;animation:rise linear forwards}
@keyframes rise{0%{transform:translateY(0);opacity:0}20%{opacity:1}100%{transform:translateY(-110vh);opacity:0}}
</style></head><body>
<div class="card"><div style="font-size:70px">🧸💗</div><h1>For Biw 💖</h1>
<p>บิวครับ ถึงเราคุยกันน้อยลง<br>แต่บีก็รักเธอเหมือนเดิมนะ<br><br>บีจะคอยปรับปรุงตัวเองให้ดีขึ้น เพื่อที่จะได้โตไปพร้อมเธอนะ</p>
<p class="note">รักเธอที่สุดเลย 🤍</p>
<button onclick="love()">กดรับหัวใจ ❤️</button>
<h2>💖 Our Memories 💖</h2>
<div class="slideshow">
<img class="slide active" src="1000001940.jpg"><img class="slide" src="1000001842.jpg"><img class="slide" src="1000001634.jpg"><img class="slide" src="1000001630.jpg">
<button class="prev">&#10094;</button><button class="next">&#10095;</button>
<div class="dots"><span class="dot active"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>
<p style="font-size:.9rem;color:#888">อัปโหลดรูปทั้ง 4 รูปไว้โฟลเดอร์เดียวกับไฟล์นี้บน GitHub</p></div>
<script>
const slides=document.querySelectorAll('.slide'),dots=document.querySelectorAll('.dot');let i=0;
function show(n){slides.forEach(s=>s.classList.remove('active'));dots.forEach(d=>d.classList.remove('active'));slides[n].classList.add('active');dots[n].classList.add('active');}
function next(){i=(i+1)%slides.length;show(i)} function prev(){i=(i-1+slides.length)%slides.length;show(i)}
document.querySelector('.next').onclick=next;document.querySelector('.prev').onclick=prev;setInterval(next,3000);
function spawn(){let h=document.createElement('div');h.className='heart';h.textContent=['💖','💕','💗','💞'][Math.floor(Math.random()*4)];h.style.left=Math.random()*100+'vw';h.style.fontSize=(18+Math.random()*18)+'px';h.style.animationDuration=(4+Math.random()*4)+'s';document.body.appendChild(h);setTimeout(()=>h.remove(),8000)}
setInterval(spawn,300);function love(){for(let k=0;k<80;k++)setTimeout(spawn,k*40);alert('Love You Forever, Biw 💖');}
</script></body></html>
