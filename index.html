<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>For Biw 💖</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Arial,sans-serif}
body{
background:linear-gradient(135deg,#ffd6e8,#ffeef7,#fff8fb);
display:flex;justify-content:center;align-items:center;
}
.card{
position:relative;z-index:2;
width:min(90%,650px);
background:rgba(255,255,255,.9);
border-radius:30px;
padding:30px;
text-align:center;
box-shadow:0 10px 35px rgba(0,0,0,.15)
}
h1{color:#ff4f8b;font-size:2.2rem}
p{font-size:1.15rem;line-height:1.8;color:#555}
button{
background:#ff5f9a;color:#fff;border:none;border-radius:999px;
padding:14px 28px;font-size:18px;cursor:pointer}
button:hover{transform:scale(1.05)}
.heart{
position:fixed;
bottom:-30px;
font-size:24px;
animation:rise linear forwards;
pointer-events:none;
}
@keyframes rise{
0%{transform:translateY(0) scale(.8);opacity:0}
20%{opacity:1}
100%{transform:translateY(-110vh) scale(1.4);opacity:0}
}
.bear{font-size:72px}
.note{color:#ff4f8b;font-weight:bold}
.small{font-size:.9rem;color:#888}
</style>
</head>
<body>
<audio id="bgm" loop controls style="position:fixed;top:10px;right:10px;z-index:5">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="card">
<div class="bear">🧸💗</div>
<h1>For Biw 💖</h1>
<p>
บิวครับ ถึงเราคุยกันน้อยลง<br>
แต่บีก็รักเธอเหมือนเดิมนะ<br><br>
บีจะคอยปรับปรุงตัวเองให้ดีขึ้น<br>
เพื่อที่จะได้โตไปพร้อมเธอนะ
</p>
<p class="note">รักเธอที่สุดเลย 🤍</p>
<button onclick="love()">กดรับหัวใจ ❤️</button>
<p class="small">เปิดเพลงได้จากปุ่มด้านขวาบน 🎵</p>
</div>

<script>
function spawn(){
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML=["💖","💕","💗","💞"][Math.floor(Math.random()*4)];
 h.style.left=Math.random()*100+"vw";
 h.style.animationDuration=(4+Math.random()*4)+"s";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),8000);
}
setInterval(spawn,300);

function love(){
 for(let i=0;i<80;i++)setTimeout(spawn,i*40);
 alert("Love You Forever, Biw 💖");
}
</script>
</body>
</html>
