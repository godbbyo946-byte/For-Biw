<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>For Biw 💖</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ffd6e8,#fff);overflow-x:hidden}
.card{max-width:700px;width:92%;margin:20px auto;padding:24px;border-radius:24px;background:#ffffffee;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.15)}
h1{color:#ff4f8b;margin:10px 0}
p{font-size:1.1rem;line-height:1.8;color:#555}
.note{color:#ff4f8b;font-weight:bold}
button{background:#ff5f9a;color:#fff;border:none;border-radius:999px;padding:14px 24px;font-size:18px}
.gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:20px}
.gallery img{width:min(100%,260px);border-radius:18px;box-shadow:0 6px 16px rgba(0,0,0,.2)}
audio{width:100%;max-width:420px;margin:12px auto;display:block}
.heart{position:fixed;bottom:-30px;pointer-events:none;animation:rise linear forwards}
@keyframes rise{from{transform:translateY(0);opacity:0}20%{opacity:1}to{transform:translateY(-110vh);opacity:0}}
</style>
</head><body>
<div class="card">
<div style="font-size:70px">🧸💗</div>
<h1>For Biw 💖</h1>
<p>บิวครับ ถึงเราคุยกันน้อยลง<br>แต่บีก็รักเธอเหมือนเดิมนะ<br><br>บีจะคอยปรับปรุงตัวเองให้ดีขึ้น เพื่อที่จะได้โตไปพร้อมเธอนะ</p>
<p class="note">รักเธอที่สุดเลย 🤍</p>
<button onclick="love()">กดรับหัวใจ ❤️</button>
<h2>💖 Our Memories 💖</h2>

<div class="gallery slideshow">
<img class="slide active" src="1000001940.jpg">
<img class="slide" src="1000001842.jpg">
<img class="slide" src="1000001634.jpg">
<img class="slide" src="1000001630.jpg">
</div>
<style>
.slideshow{position:relative;height:420px;overflow:hidden;border-radius:16px}
.slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s ease-in-out}
.slide.active{opacity:1}
</style>

<p style="font-size:.9rem;color:#888">หากรูปไม่ขึ้น ให้อัปโหลดไฟล์รูปทั้ง 2 รูปไปยัง GitHub ด้วยชื่อเดิม</p>
</div>
<script>
function spawn(){let h=document.createElement('div');h.className='heart';h.textContent=['💖','💕','💗','💞'][Math.floor(Math.random()*4)];
h.style.left=Math.random()*100+'vw';h.style.fontSize=(18+Math.random()*18)+'px';h.style.animationDuration=(4+Math.random()*4)+'s';document.body.appendChild(h);setTimeout(()=>h.remove(),8000);}
setInterval(spawn,300);
function love(){for(let i=0;i<80;i++)setTimeout(spawn,i*40);alert('Love You Forever, Biw 💖');}

let i=0;const slides=document.querySelectorAll('.slide');
setInterval(()=>{slides[i].classList.remove('active');i=(i+1)%slides.length;slides[i].classList.add('active');},3000);

</script>
</body></html>
