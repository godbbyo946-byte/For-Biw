<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>For Biw 💖</title>
    <style>
        * { box-sizing: border-box }
        body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg, #ffd6e8, #fff); overflow-x: hidden }
        .card { max-width: 720px; width: 92%; margin: 44px auto; background: rgba(255, 255, 255, .92); border-radius: 24px; padding: 32px 24px; text-align: center; box-shadow: 0 10px 30px rgba(0, 0, 0, .15) }
        h1 { color: #ff4f8b; margin-top: 10px; }
        p { line-height: 1.8; color: #555; font-size: 16px; }
        .note { font-weight: bold; color: #ff4f8b; font-size: 18px; margin: 20px 0; }
        button { background: #ff5f9a; color: #fff; border: none; padding: 14px 32px; border-radius: 999px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 95, 154, 0.4); transition: transform 0.2s; }
        button:active { transform: scale(0.95); }
        .heart { position: fixed; bottom: -30px; pointer-events: none; animation: rise linear forwards }
        @keyframes rise {
            0% { transform: translateY(0); opacity: 0 }
            20% { opacity: 1 }
            100% { transform: translateY(-110vh); opacity: 0 }
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size:70px">🧸💗</div>
        <h1>For Biw 💖</h1>
        <p>บิวครับ ถึงเราคุยกันน้อยลง<br>แต่บีก็รักเธอเหมือนเดิมนะ<br><br>บีจะคอยปรับปรุงตัวเองให้ดีขึ้น เพื่อที่จะได้โตไปพร้อมเธอนะ</p>
        <p class="note">รักเธอที่สุดเลย 🤍</p>
        <button onclick="love()">กดรับหัวใจ ❤️</button>
    </div>

    <script>
        function spawn() { 
            let h = document.createElement('div'); 
            h.className = 'heart'; 
            h.textContent = ['💖', '💕', '💗', '💞'][Math.floor(Math.random() * 4)]; 
            h.style.left = Math.random() * 100 + 'vw'; 
            h.style.fontSize = (18 + Math.random() * 18) + 'px'; 
            h.style.animationDuration = (4 + Math.random() * 4) + 's'; 
            document.body.appendChild(h); 
            setTimeout(() => h.remove(), 8000) 
        }
        setInterval(spawn, 300); 
        
        function love() { 
            for (let k = 0; k < 80; k++) {
                setTimeout(spawn, k * 40); 
            }
            alert('Love You Forever, Biw 💖'); 
        }
    </script>
</body>
</html>
